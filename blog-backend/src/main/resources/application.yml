server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: xiaolu-blog
  datasource:
    url: jdbc:mysql://localhost:3306/xiaolu_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: xiaolu-blog-secret-key-2026-06-12-this-is-a-very-long-secret-key
  expiration: 86400000  # 24小时

blog:
  upload:
    path: ./uploads/  # 图片上传路径
  rss:
    title: 小鹿博客
    description: 生活明朗, 万物可爱
    author: 小鹿
