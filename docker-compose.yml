version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: xiaolu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xiaolu_blog
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./blog-backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: xiaolu-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./blog-backend
      dockerfile: Dockerfile
    container_name: xiaolu-backend
    ports:
      - "9090:9090"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/xiaolu_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATA_REDIS_HOST: redis
    volumes:
      - uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./blog-frontend
      dockerfile: Dockerfile
    container_name: xiaolu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
  uploads:
